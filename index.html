<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Mix RGB Breakout</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="ozadje">
        <div id="zacetni-zaslon">
            <h1>COLOR MIX RGB</h1>
            
            <div id="login-container">
                <p>Vnesi svoje ime:</p>
                <input type="text" id="username" placeholder="Ime igralca..." maxlength="15" oninput="posodobiGumbNivojev()">
            </div>

            <div class="level-selection">
                <p>Izberi nivo:</p>
                <div class="nivoji-container">
                    <button class="gumb-nivo" id="btn-nivo-1" onclick="preveriInZacni(1)">1</button>
                    <button class="gumb-nivo" id="btn-nivo-2" onclick="preveriInZacni(2)" disabled>2</button>
                    <button class="gumb-nivo" id="btn-nivo-3" onclick="preveriInZacni(3)" disabled>3</button>
                    <button class="gumb-nivo" id="btn-nivo-4" onclick="preveriInZacni(4)" disabled>4</button>
                    <button class="gumb-nivo" id="btn-nivo-5" onclick="preveriInZacni(5)" disabled>5</button>
                </div>
            </div>
            
            <div class="menu-actions">
                <button class="gumb-glavni" onclick="pokaziNavodila()">NAVODILA</button>
            </div>
            
            <div id="leaderboard-container">
                <h3>TOP 5 IGRALCEV</h3>
                <ul id="top-scores"></ul>
            </div>
        </div>

        <div id="igra-zaslon" style="display:none;">
            <div class="stats-bar">
                <div class="stat-item">Igralec: <span id="prikaz-ime">-</span></div>
                <div class="stat-item">Točke: <span id="tocke">0</span></div>
                <div class="stat-item">Čas: <span id="cas">00:00</span></div>
                <div class="stat-item">Nivo: <span id="prikaz-nivo">1</span></div>
            </div>
            <div class="canvas-wrapper">
                <canvas id="canvas" width="800" height="600"></canvas>
            </div>
        </div>
    </div>

    <script src="js/code.js"></script>
    <script>
        window.addEventListener("load", function() {
            const shranjenoIme = localStorage.getItem("zadnjeIme");
            if (shranjenoIme) {
                document.getElementById("username").value = shranjenoIme;
                posodobiGumbNivojev(); // Takoj odkleni nivoje za to ime
            }
        });

        function preveriInZacni(n) {
            const ime = document.getElementById("username").value.trim();
            if (ime === "") {
                Swal.fire({ icon: 'warning', title: 'Vnesi ime!', background: '#1a1a1a', color: '#fff' });
                return;
            }
            localStorage.setItem("zadnjeIme", ime);
            trenutniUporabnik = ime;
            document.getElementById("prikaz-ime").innerText = ime;
            document.getElementById("prikaz-nivo").innerText = n;
            $("#zacetni-zaslon").hide();
            $("#igra-zaslon").show();
            trenutniNivo = n;
            initGame();
        }

        function pokaziNavodila() {
            Swal.fire({
                title: 'NAVODILA',
                background: '#1a1a1a', color: '#fff',
                html: `
        <div style="text-align: left; line-height: 1.4;">
            <p><b>Cilj:</b> Uniči opeke. Napačna barva opeko za <b>6s spremeni v sivo</b>.</p>
            <p><b>Upravljanje:</b> Puščice za premik, 1-3 za barve, SPACE za pavzo.</p>
            <div style="background: #ffffff; padding: 20px; border-radius: 15px; margin-top: 15px; color: #000; box-shadow: inset 0 0 10px rgba(0,0,0,0.1);">
                <center><b style="text-transform: uppercase;">RGB Mešanje Svetlobe</b></center>
                <table style="width:100%; margin-top:10px; border-collapse: collapse; font-size: 0.9em; color: #000;">
                    <tr style="border-bottom: 2px solid #333;">
                        <th style="text-align:left; padding: 5px;">Tipke</th>
                        <th style="text-align:left; padding: 5px;">Žogica</th>
                        <th style="text-align:left; padding: 5px;">Uniči...</th>
                    </tr>
                    <tr><td><b>1</b></td><td style="color:red; font-weight:bold;">RDEČA</td><td>Rdeče</td></tr>
                    <tr><td><b>2</b></td><td style="color:green; font-weight:bold;">ZELENA</td><td>Zelene</td></tr>
                    <tr><td><b>3</b></td><td style="color:blue; font-weight:bold;">MODRA</td><td>Modre</td></tr>
                    <tr style="background:#f2f2f2;"><td><b>1 + 2</b></td><td style="color:#D4B106; font-weight:bold;">RUMENA</td><td>Rdeče, Zelene</td></tr>
                    <tr><td><b>2 + 3</b></td><td style="color:#008B8B; font-weight:bold;">CIJAN</td><td>Zelene, Modre</td></tr>
                    <tr style="background:#f2f2f2;"><td><b>1 + 3</b></td><td style="color:#C000C0; font-weight:bold;">MAGENTA</td><td>Rdeče, Modre</td></tr>
                </table>
            </div>
            <div style="font-size: 0.75em; color: #888; margin-top: 15px; text-align: right; font-style: italic;">avtor: Teja Marc</div>
        </div>`
            });
        }
    </script>
</body>
</html>
