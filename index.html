<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Color Mix Breakout</title>
    <link rel="icon" href="slike/icon.png">
	<link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="ozadje">
        <div id="zacetni-zaslon">
            <h1>COLOR MIX</h1>
            <p>Izberi nivo in začni izziv!</p>
            <div class="nivoji-container">
                <button class="gumb-nivo" onclick="izberiNivo(1)">1</button>
                <button class="gumb-nivo" onclick="izberiNivo(2)">2</button>
                <button class="gumb-nivo" onclick="izberiNivo(3)">3</button>
                <button class="gumb-nivo" onclick="izberiNivo(4)">4</button>
                <button class="gumb-nivo" onclick="izberiNivo(5)">5</button>
            </div>
            <button class="gumb-glavni" onclick="pokaziNavodila()">NAVODILA</button>
        </div>
        <div id="igra-zaslon">
            <div class="stats-bar">
                Točke: <span id="tocke" style="color: #ffd700;">0</span> | 
                Čas: <span id="cas" style="color: #00d4ff;">00:00</span>
            </div>
            <canvas id="canvas" width="800" height="600"></canvas>
        </div>
    </div>

    <script src="js/code.js"></script>
    <script>
        function pokaziNavodila() {
            Swal.fire({
                title: 'NAVODILA IGRE',
                background: '#1a1a1a', color: '#fff',
                confirmButtonColor: '#00d4ff', heightAuto: false, scrollbarPadding: false,
                html: `
                <div style="text-align: left; line-height: 1.4; padding-bottom: 30px;">
                    <p><b>Cilj:</b> Uniči vse opeke. Če je žogica napačne barve, opeka za <b>6s postane siva</b>.</p>
                    <p><b>Upravljanje:</b> Puščice za premikanje, 1-3 za barve, SPACE za pavzo.</p>
                    
                    <div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; font-size: 0.85em;">
                        <center><b>MEŠANJE IN UNIČEVANJE:</b></center>
                        <table style="width:100%; margin-top:5px; border-collapse: collapse; line-height: 1.8;">
                            <tr style="border-bottom: 1px solid #444;">
                                <th>Tipke</th>
                                <th>Barva žogice</th>
                                <th>Uniči opeke</th>
                            </tr>
                            <tr>
                                <td><b>1</b></td>
                                <td style="color:#FF1C0A">RDEČA</td>
                                <td>Rdeče</td>
                            </tr>
                            <tr>
                                <td><b>2</b></td>
                                <td style="color:#0000FF">MODRA</td>
                                <td>Modre</td>
                            </tr>
                            <tr>
                                <td><b>3</b></td>
                                <td style="color:#FFFF00">RUMENA</td>
                                <td>Rumene</td>
                            </tr>
                            <tr>
                                <td><b>1 + 2</b></td>
                                <td style="color:#800080">VIJOLIČNA</td>
                                <td>Rdeče, Modre, Vijolične</td>
                            </tr>
                            <tr>
                                <td><b>2 + 3</b></td>
                                <td style="color:#228B22">ZELENA</td>
                                <td>Modre, Rumene, Zelene</td>
                            </tr>
                            <tr>
                                <td><b>1 + 3</b></td>
                                <td style="color:#FFA500">ORANŽNA</td>
                                <td>Rdeče, Rumene, Oranžne</td>
                            </tr>
                        </table>
                    </div>
                    <div class="avtor-swal">avtor: Teja Marc</div>
                </div>`
            });
        }

        function izberiNivo(n) {
            trenutniNivo = n;
            $("#zacetni-zaslon").fadeOut(400, function() {
                $("#igra-zaslon").fadeIn(400);
                initGame(); 
            });
        }
    </script>
</body>
</html>
